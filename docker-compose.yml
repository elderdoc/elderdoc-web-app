name: elderdoc

services:
  postgres:
    image: postgres:16-alpine
    container_name: elderdoc-postgres
    environment:
      POSTGRES_DB: elderdoc
      POSTGRES_USER: elderdoc
      POSTGRES_PASSWORD: elderdoc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elderdoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elderdoc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: elderdoc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: elderdoc
      MINIO_ROOT_PASSWORD: elderdoc123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
